services:
  db:
    image: postgres:12
    restart: unless-stopped
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
    volumes:
      - tracker-db-data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER?Variable not set}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD?Variable not set}
    volumes:
      - tracker-minio-data:/data
    ports:
      - 127.0.0.1:${MINIO_API_PORT:-9000}:9000
      - 127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001

  backend:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "false"
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      - DOMAIN=${SERVER_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS?Variable not set}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - PROJECT_NAME=${PROJECT_NAME?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - USERS_OPEN_REGISTRATION=${USERS_OPEN_REGISTRATION:-False}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL:-}
      - SMTP_TLS=${SMTP_TLS:-True}
      - SMTP_SSL=${SMTP_SSL:-False}
      - SMTP_PORT=${SMTP_PORT:-587}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER?Variable not set}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD?Variable not set}
      - MINIO_BUCKET=${MINIO_BUCKET:-task-attachments}
      - MINIO_SECURE=${MINIO_SECURE:-False}
      - MINIO_REGION=${MINIO_REGION:-}
      - ATTACHMENTS_MAX_SIZE_MB=${ATTACHMENTS_MAX_SIZE_MB:-10}
      - ATTACHMENTS_ALLOWED_CONTENT_TYPES=${ATTACHMENTS_ALLOWED_CONTENT_TYPES?Variable not set}
      - DEFAULT_DEADLINE_YELLOW_DAYS=${DEFAULT_DEADLINE_YELLOW_DAYS:-3}
      - DEFAULT_DEADLINE_NORMAL_DAYS=${DEFAULT_DEADLINE_NORMAL_DAYS:-5}
      - TRACKER_BACKGROUND_JOBS_ENABLED=${TRACKER_BACKGROUND_JOBS_ENABLED:-True}
      - TASK_DEADLINE_RECALC_INTERVAL_SECS=${TASK_DEADLINE_RECALC_INTERVAL_SECS:-120}
      - DESKTOP_AGENT_DOWNLOAD_URL=${DESKTOP_AGENT_DOWNLOAD_URL:-}
      - DESKTOP_AGENT_BINARY_PATH=${DESKTOP_AGENT_BINARY_PATH:-/opt/enbektracker/downloads/EnbekTracker_0.1.0_x64-setup.exe}
    volumes:
      - ${AGENT_DOWNLOADS_DIR:-./deploy/desktop-agent}:/opt/enbektracker/downloads:ro
    ports:
      - 127.0.0.1:${BACKEND_PORT:-8888}:80

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=
        - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - ${APP_PORT:-80}:80

volumes:
  tracker-db-data:
  tracker-minio-data:
